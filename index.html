<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CCPayment Site Verification Meta Tag -->
    <meta name="ccpayment-site-verification" content="6ca8bd680dac1bb9924d6ad39c81de5c"/>
    
    <title>GrShop - Premium Accounts Marketplace</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070a13;
            --card-dark: #0f1424;
            --input-bg: #171e36;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --dropdown-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* Auth Styles */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 50%);
        }

        .auth-card {
            background: var(--card-dark);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .brand span { color: var(--primary); }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-box input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-box {
            background: #1c2131;
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-right: 15px;
        }

        .balance-box .icon { color: var(--success); font-size: 18px; }

        .balance-info .title {
            color: var(--success);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .balance-info .amount {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
        }

        .nav-right { display: flex; align-items: center; position: relative; }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #fff;
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 240px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            z-index: 1001;
        }

        .user-dropdown a {
            padding: 12px 20px;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown a:hover { background: rgba(255, 255, 255, 0.08); }
        .menu-divider { height: 1px; background: var(--border); margin: 8px 0; }
        .logout-item { color: var(--error) !important; }

        /* Sections */
        .view-section { max-width: 1000px; margin: 40px auto; padding: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .content-card { background: var(--card-dark); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .p-card { background: var(--card-dark); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .buy-btn { background: var(--success); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #1c2131; color: #fff; padding: 15px 25px; border-radius: 10px; border-left: 5px solid var(--primary); margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.5s; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <!-- Auth UI -->
    <div id="auth-container" class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">Gr<span>Shop</span></div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <h2>Sign In</h2>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email Address" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" placeholder="Password" required>
                </div>
                <button type="submit" class="primary-btn">Login Now</button>
                <p style="margin-top: 20px; font-size: 14px;">New User? <a href="#" onclick="toggleAuth('signup')" style="color: var(--primary); text-decoration: none;">Sign Up</a></p>
            </form>
            <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
                <h2>Create Account</h2>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Full Name" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email Address" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-pass" placeholder="Password" required>
                </div>
                <button type="submit" class="primary-btn">Register</button>
                <p style="margin-top: 20px; font-size: 14px;">Already have account? <a href="#" onclick="toggleAuth('login')" style="color: var(--primary); text-decoration: none;">Sign In</a></p>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="brand" onclick="renderView('market')" style="cursor:pointer">Gr<span>Shop</span></div>
                <div class="nav-right">
                    <div class="balance-box">
                        <div class="icon"><i class="fa-solid fa-paper-plane"></i></div>
                        <div class="balance-info">
                            <div class="title">Live Account</div>
                            <div class="amount">$<span id="current-balance">0.00</span></div>
                        </div>
                    </div>
                    <div class="user-profile" id="profile-trigger">
                        <i class="fa-solid fa-circle-user"></i>
                        <span id="user-display-name">User</span>
                        <i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i>
                        <div id="user-menu" class="user-dropdown hidden">
                            <a href="javascript:void(0)" onclick="renderView('deposit')"><i class="fa-solid fa-wallet"></i> Deposit</a>
                            <a href="javascript:void(0)" onclick="renderView('withdraw')"><i class="fa-solid fa-money-bill-transfer"></i> Withdrawal</a>
                            <a href="javascript:void(0)" onclick="renderView('transactions')"><i class="fa-solid fa-list-ul"></i> Transactions</a>
                            <a href="javascript:void(0)" onclick="renderView('account')"><i class="fa-solid fa-user-gear"></i> My account</a>
                            <div class="menu-divider"></div>
                            <a href="javascript:void(0)" onclick="handleLogout()" class="logout-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div id="view-container">
            <!-- Marketplace -->
            <div id="view-market" class="view-section">
                <h1 style="margin-bottom: 20px;">Marketplace</h1>
                <div class="inventory-grid">
                    <div class="p-card">
                        <i class="fa-solid fa-envelope" style="font-size: 30px; color: var(--primary);"></i>
                        <h3>Hotmail PVA</h3>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                            <span style="font-size: 20px; font-weight: 700;">$0.10</span>
                            <button class="buy-btn" onclick="processPurchase(0.10, 'Hotmail')">Buy Now</button>
                        </div>
                    </div>
                    <!-- Add more products as needed -->
                </div>
            </div>

            <!-- Deposit View -->
            <div id="view-deposit" class="view-section hidden">
                <div class="content-card">
                    <h2>Add Funds</h2>
                    <div class="form-group">
                        <label>Deposit Amount ($)</label>
                        <input type="number" id="deposit-amount" placeholder="Min $5.00">
                    </div>
                    <button class="primary-btn" onclick="handleDeposit()">Proceed</button>
                </div>
            </div>
            
            <!-- Other views go here (Withdraw, Account, Transactions) -->
             <div id="view-withdraw" class="view-section hidden"><div class="content-card"><h2>Withdrawal</h2><p>Coming Soon...</p></div></div>
             <div id="view-transactions" class="view-section hidden"><div class="content-card"><h2>Transactions</h2><div id="history-list">No history.</div></div></div>
             <div id="view-account" class="view-section hidden">
                <div class="content-card">
                    <h2>Account Settings</h2>
                    <p>Change Password:</p>
                    <div class="form-group"><input type="password" id="new-pass" placeholder="New Password"></div>
                    <button class="primary-btn" onclick="updatePassword()">Update</button>
                </div>
             </div>
        </div>
    </div>

    <script>
        let currentUser = { balance: 0.00, history: [] };

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("grshop_session") === "true") {
                loadUser();
                renderView('market');
            } else {
                document.getElementById("auth-container").classList.remove("hidden");
            }

            const trigger = document.getElementById("profile-trigger");
            const menu = document.getElementById("user-menu");
            if (trigger) {
                trigger.addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("hidden"); });
            }
            window.addEventListener("click", () => menu.classList.add("hidden"));
        });

        function renderView(viewName) {
            const sections = ['market', 'deposit', 'withdraw', 'account', 'transactions'];
            sections.forEach(s => document.getElementById(`view-${s}`).classList.add("hidden"));
            document.getElementById(`view-${viewName}`).classList.remove("hidden");
        }

        function toggleAuth(mode) {
            document.getElementById("login-form").classList.toggle("hidden", mode === 'signup');
            document.getElementById("signup-form").classList.toggle("hidden", mode === 'login');
        }

        function loadUser() {
            const data = JSON.parse(localStorage.getItem("user_data") || "{}");
            currentUser = data;
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("user-display-name").innerText = data.name || "User";
            updateBalanceUI();
        }

        function updateBalanceUI() {
            document.getElementById("current-balance").innerText = parseFloat(currentUser.balance || 0).toFixed(2);
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById("signup-name").value;
            const email = document.getElementById("signup-email").value;
            const pass = document.getElementById("signup-pass").value;
            currentUser = { name, email, pass, balance: 0.00, history: [] };
            localStorage.setItem("user_data", JSON.stringify(currentUser));
            localStorage.setItem("grshop_session", "true");
            location.reload();
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-pass").value;
            const stored = JSON.parse(localStorage.getItem("user_data") || "{}");
            if (email === (stored.email || "admin@grshop.com") && pass === (stored.pass || "123456")) {
                localStorage.setItem("grshop_session", "true");
                if(!stored.email) localStorage.setItem("user_data", JSON.stringify({name:"Admin", email:"admin@grshop.com", pass:"123456", balance:10.0, history:[]}));
                location.reload();
            } else { triggerToast("Invalid Credentials", "error"); }
        }

        function handleLogout() { localStorage.removeItem("grshop_session"); location.reload(); }

        function handleDeposit() {
            const amt = parseFloat(document.getElementById("deposit-amount").value);
            if(amt >= 5) {
                currentUser.balance += amt;
                saveUser();
                triggerToast(`Deposit of $${amt} Successful!`, "success");
                renderView('market');
            } else { triggerToast("Min deposit $5", "error"); }
        }

        function processPurchase(price, item) {
            if(currentUser.balance >= price) {
                currentUser.balance -= price;
                saveUser();
                triggerToast(`Purchased ${item}!`, "success");
            } else { triggerToast("Insufficient Balance", "error"); }
        }

        function saveUser() {
            localStorage.setItem("user_data", JSON.stringify(currentUser));
            updateBalanceUI();
        }

        function triggerToast(msg, type) {
            const tc = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--error)';
            t.innerText = msg;
            tc.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        function updatePassword() {
            const p = document.getElementById("new-pass").value;
            if(p.length >= 6) { currentUser.pass = p; saveUser(); triggerToast("Password Updated", "success"); }
        }
    </script>
</body>
</html>
